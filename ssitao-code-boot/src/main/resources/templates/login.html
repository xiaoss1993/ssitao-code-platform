<!DOCTYPE html>
<html lang="zh-cn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${siteName} + ' - 登录'">SSITAO Code Platform - 登录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" th:href="@{/assets/img/favicon.ico}" href="assets/img/favicon.ico" />
    <link th:href="@{/assets/css/backend.min.css}" href="assets/css/backend.min.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="assets/js/html5shiv.js"></script>
    <script src="assets/js/respond.min.js"></script>
    <![endif]-->

    <script th:inline="javascript">
        var require = {
            "config": {
                "site": {
                    "name": [[${siteName != null ? siteName : 'SSITAO Code Platform'}]],
                    "cdnurl": /*[[@{/}]]*/ "./",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {
                        "backend": "zh-cn",
                        "frontend": "zh-cn"
                    }
                },
                "upload": {
                    "cdnurl": /*[[@{/}]]*/ "./",
                    "uploadurl": /*[[@{/api/upload}]]*/ "api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "admin",
                "controllername": "index",
                "actionname": "login",
                "jsname": "backend/index",
                "moduleurl": /*[[@{/}]]*/ "./",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>

    <style type="text/css">
        body {
            color: #999;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            min-height: 100vh;
        }
        a {
            color: #fff;
        }
        .login-panel {
            margin-top: 150px;
        }
        .login-screen {
            max-width: 400px;
            padding: 0;
            margin: 100px auto 0 auto;
        }
        .login-screen .well {
            border-radius: 10px;
            -webkit-box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .login-screen .copyright {
            text-align: center;
            color: #fff;
        }
        @media(max-width:767px) {
            .login-screen {
                padding: 0 20px;
            }
        }
        .profile-img-card {
            width: 100px;
            height: 100px;
            margin: 10px auto;
            display: block;
            -moz-border-radius: 50%;
            -webkit-border-radius: 50%;
            border-radius: 50%;
        }
        .profile-name-card {
            text-align: center;
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }
        #login-form {
            margin-top: 20px;
        }
        #login-form .input-group {
            margin-bottom: 15px;
        }
        .alert-danger {
            margin-bottom: 15px;
        }
        .btn-success {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-success:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <div class="login-screen">
                <div class="well">
                    <div class="login-form">
                        <img id="profile-img" class="profile-img-card" th:src="@{/assets/img/avatar.png}" src="assets/img/avatar.png" />
                        <p id="profile-name" class="profile-name-card" th:text="${siteName}">SSITAO Code Platform</p>

                        <!-- 错误提示 -->
                        <div class="alert alert-danger" th:if="${error}" th:text="${error}">
                            用户名或密码错误
                        </div>

                        <form th:action="@{/login}" action="/login" method="post" id="login-form">
                            <div class="input-group">
                                <div class="input-group-addon">
                                    <span class="glyphicon glyphicon-user" aria-hidden="true"></span>
                                </div>
                                <input type="text" class="form-control" id="username" placeholder="用户名"
                                       name="username" autocomplete="off"
                                       th:value="${username}" value=""
                                       data-rule="用户名:required;username" />
                            </div>

                            <div class="input-group">
                                <div class="input-group-addon">
                                    <span class="glyphicon glyphicon-lock" aria-hidden="true"></span>
                                </div>
                                <input type="password" class="form-control" id="password" placeholder="密码"
                                       name="password" autocomplete="off" value=""
                                       data-rule="密码:required;password" />
                            </div>

                            <div class="form-group">
                                <label class="inline" for="keeplogin">
                                    <input type="checkbox" name="keeplogin" id="keeplogin" value="1" />
                                    保持会话
                                </label>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="btn btn-success btn-lg btn-block">登 录</button>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="copyright">
                    <a href="javascript:;">Powered By SSITAO Code Platform</a>
                </p>
            </div>
        </div>
    </div>
    <script th:src="@{/assets/js/require.min.js}" src="assets/js/require.min.js"
            data-main="@{/assets/js/require-backend.min.js}"></script>
</body>
</html>
