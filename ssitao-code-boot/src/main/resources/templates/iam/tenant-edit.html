<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>租户编辑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {
                        "backend": "zh-cn",
                        "frontend": "zh-cn"
                    }
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "iam",
                "controllername": "tenant",
                "actionname": "edit",
                "jsname": "backend/iam/tenant",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside is-dialog">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>租户编辑</h1>
                        </section>
                        <div class="content">
                            <form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST">
                                <input type="hidden" name="id" id="id" value="" />

                                <div class="form-group">
                                    <label for="tenantName" class="control-label col-xs-12 col-sm-2">租户名称 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="tenantName" name="tenantName" value="" placeholder="请输入租户名称" data-rule="required" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="tenantCode" class="control-label col-xs-12 col-sm-2">租户编码 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="tenantCode" name="tenantCode" value="" placeholder="请输入租户编码" data-rule="required" />
                                        <span class="help-block">只能包含字母、数字和下划线</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="contactName" class="control-label col-xs-12 col-sm-2">联系人</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="contactName" name="contactName" value="" placeholder="请输入联系人" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="contactPhone" class="control-label col-xs-12 col-sm-2">联系电话</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="contactPhone" name="contactPhone" value="" placeholder="请输入联系电话" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="contactEmail" class="control-label col-xs-12 col-sm-2">联系邮箱</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="email" class="form-control" id="contactEmail" name="contactEmail" value="" placeholder="请输入联系邮箱" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="expireTime" class="control-label col-xs-12 col-sm-2">过期时间</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="expireTime" name="expireTime" value="" placeholder="请选择过期时间" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="maxUsers" class="control-label col-xs-12 col-sm-2">最大用户数</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="number" class="form-control" id="maxUsers" name="maxUsers" value="0" placeholder="0表示不限制" />
                                        <span class="help-block">0表示不限制</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="status" class="control-label col-xs-12 col-sm-2">状态</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <label class="radio-inline">
                                            <input type="radio" name="status" value="true" checked /> 启用
                                        </label>
                                        <label class="radio-inline">
                                            <input type="radio" name="status" value="false" /> 禁用
                                        </label>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="remark" class="control-label col-xs-12 col-sm-2">备注</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="请输入备注"></textarea>
                                    </div>
                                </div>

                                <div class="form-group hidden layer-footer">
                                    <label class="control-label col-xs-12 col-sm-2"></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <button type="submit" class="btn btn-success btn-embossed">确定</button>
                                        <button type="reset" class="btn btn-default btn-embossed">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
</body>
</html>
