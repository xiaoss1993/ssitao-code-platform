<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>账号编辑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {"backend": "zh-cn", "frontend": "zh-cn"}
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "iam",
                "controllername": "account",
                "actionname": "edit",
                "jsname": "backend/iam/account",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside is-dialog">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>账号编辑</h1>
                        </section>
                        <div class="content">
                            <form id="edit-form" class="form-horizontal form-ajax" role="form" method="POST">
                                <input type="hidden" name="id" id="id" value="" />

                                <div class="form-group">
                                    <label for="accountCode" class="control-label col-xs-12 col-sm-2">账号编码 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="accountCode" name="accountCode"
                                               value="" placeholder="请输入账号编码" data-rule="required" />
                                        <span class="help-block">只能包含字母、数字和下划线</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="accountName" class="control-label col-xs-12 col-sm-2">账号名称 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="accountName" name="accountName"
                                               value="" placeholder="请输入账号名称" data-rule="required" />
                                    </div>
                                </div>

                                <div class="form-group" id="password-group">
                                    <label for="password" class="control-label col-xs-12 col-sm-2">
                                        密码 <span class="text-danger">*</span>
                                    </label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="password" class="form-control" id="password" name="password"
                                               placeholder="请输入密码" data-rule="required;length(6~20)" />
                                        <span class="help-block" id="password-hint">密码长度6-20位</span>
                                    </div>

                                <div class="form-group">
                                    <label for="phone" class="control-label col-xs-12 col-sm-2">手机号</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="phone" name="phone"
                                               value="" placeholder="请输入手机号" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="email" class="control-label col-xs-12 col-sm-2">邮箱</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="email" class="form-control" id="email" name="email"
                                               value="" placeholder="请输入邮箱" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="avatar" class="control-label col-xs-12 col-sm-2">头像URL</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="avatar" name="avatar"
                                               value="" placeholder="请输入头像URL" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="expireTime" class="control-label col-xs-12 col-sm-2">过期时间</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control datetimepicker" id="expireTime" name="expireTime"
                                               value="" placeholder="请选择过期时间" />
                                        <span class="help-block">留空表示永久有效</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="remark" class="control-label col-xs-12 col-sm-2">备注</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <textarea class="form-control" id="remark" name="remark"
                                                  rows="3" placeholder="请输入备注"></textarea>
                                    </div>
                                </div>

                                <div class="form-group hidden layer-footer">
                                    <label class="control-label col-xs-12 col-sm-2"></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <button type="submit" class="btn btn-success btn-embossed">确定</button>
                                        <button type="reset" class="btn btn-default btn-embossed">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
</body>
</html>
