<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>菜单管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">
    <!-- 使用 default 主题的 ztree CSS -->
    <link rel="stylesheet" href="/assets/libs/jquery-ztree/css/default/zTreeStyle.css">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {"backend": "zh-cn", "frontend": "zh-cn"}
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "iam",
                "controllername": "menu",
                "actionname": "index",
                "jsname": "backend/iam/menu",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>菜单管理</h1>
                        </section>
                        <div id="ribbon">
                            <ol class="breadcrumb pull-left">
                                <li><a href="/console" class="addtabsit"><i class="fa fa-dashboard"></i> 控制台</a></li>
                                <li><a href="javascript:;" data-url="iam">IAM管理</a></li>
                                <li><a href="javascript:;" data-url="iam/menu">菜单管理</a></li>
                            </ol>
                        </div>
                        <div class="content">
                            <div class="panel panel-default panel-intro">
                                <div class="panel-body">
                                    <div id="myTabContent" class="tab-content">
                                        <div class="tab-pane fade active in">
                                            <div class="widget-body no-padding">
                                                <div class="row">
                                                    <!-- 左侧树形菜单 -->
                                                    <div class="col-xs-3 col-sm-3 col-md-3 col-lg-3">
                                                        <div class="panel panel-default">
                                                            <div class="panel-heading">
                                                                <h3 class="panel-title">
                                                                    <i class="fa fa-sitemap"></i> 菜单树
                                                                    <div class="pull-right">
                                                                        <a href="javascript:;" class="btn-add-root btn btn-xs btn-success" title="添加根菜单">
                                                                            <i class="fa fa-plus"></i>
                                                                        </a>
                                                                        <a href="javascript:;" class="btn-refresh-tree btn btn-xs btn-primary" title="刷新">
                                                                            <i class="fa fa-refresh"></i>
                                                                        </a>
                                                                    </div>
                                                                </h3>
                                                            </div>
                                                            <div class="panel-body" style="padding: 0;">
                                                                <div id="menuTree" class="ztree" style="overflow: auto; height: 500px;"></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <!-- 右侧表格 -->
                                                    <div class="col-xs-9 col-sm-9 col-md-9 col-lg-9">
                                                        <div id="toolbar" class="toolbar">
                                                            <a href="javascript:;" class="btn btn-success btn-add" title="添加">
                                                                <i class="fa fa-plus"></i> 添加
                                                            </a>
                                                            <a href="javascript:;" class="btn btn-primary btn-edit" title="编辑">
                                                                <i class="fa fa-pencil"></i> 编辑
                                                            </a>
                                                            <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled" title="删除">
                                                                <i class="fa fa-trash"></i> 删除
                                                            </a>
                                                            <a href="javascript:;" class="btn btn-primary btn-refresh" title="刷新">
                                                                <i class="fa fa-refresh"></i>
                                                            </a>
                                                        </div>
                                                        <table id="table" class="table table-striped table-bordered table-hover" width="100%">
                                                        </table>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- 使用 requirejs 加载 -->
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
</body>
</html>
