<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>账号管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {
                        "backend": "zh-cn",
                        "frontend": "zh-cn"
                    }
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "iam",
                "controllername": "account",
                "actionname": "index",
                "jsname": "backend/iam/account",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
        // 全局Config变量，供backend.js使用
        window.Config = require.config;
    </script>
    <!-- 预先加载 Vue.js -->
    <script src="/assets/libs/vue/vue.js"></script>
    <style>
        [v-cloak] { display: none; }
        .toolbar { margin-bottom: 10px; }
        .search-form { margin-bottom: 15px; }
    </style>
</head>

<body class="inside-header inside-aside">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>账号管理</h1>
                        </section>
                        <!-- RIBBON -->
                        <div id="ribbon">
                            <ol class="breadcrumb pull-left">
                                <li><a href="/console" class="addtabsit"><i class="fa fa-dashboard"></i> 控制台</a></li>
                                <li><a href="javascript:;" data-url="iam">IAM管理</a></li>
                                <li><a href="javascript:;" data-url="iam/account">账号管理</a></li>
                            </ol>
                        </div>
                        <!-- END RIBBON -->
                        <div class="content">
                            <div class="panel panel-default panel-intro">
                                <div class="panel-body">
                                    <div id="myTabContent" class="tab-content">
                                        <div class="tab-pane fade active in" id="one">
                                            <div class="widget-body no-padding">
                                                <!-- Vue容器：工具栏和搜索 -->
                                                <div id="vue-app" v-cloak>
                                                    <!-- 工具栏 -->
                                                    <div class="toolbar">
                                                        <button class="btn btn-success btn-add" @click="handleAdd">
                                                            <i class="fa fa-plus"></i> 添加
                                                        </button>
                                                        <button class="btn btn-danger btn-del" :disabled="!hasSelected" @click="handleBatchDelete">
                                                            <i class="fa fa-trash"></i> 删除
                                                        </button>
                                                        <button class="btn btn-primary btn-refresh" @click="refreshTable()">
                                                            <i class="fa fa-refresh"></i> 刷新
                                                        </button>
                                                    </div>
                                                    <!-- 搜索表单 -->
                                                    <div class="search-form">
                                                        <div class="row">
                                                            <div class="col-xs-12 col-sm-3">
                                                                <input type="text" class="form-control" v-model="search.accountCode" placeholder="账号编码" @keyup.enter="doSearch" />
                                                            </div>
                                                            <div class="col-xs-12 col-sm-3">
                                                                <input type="text" class="form-control" v-model="search.accountName" placeholder="账号名称" @keyup.enter="doSearch" />
                                                            </div>
                                                            <div class="col-xs-12 col-sm-3">
                                                                <button class="btn btn-primary" @click="doSearch">
                                                                    <i class="fa fa-search"></i> 搜索
                                                                </button>
                                                                <button class="btn btn-default" @click="resetSearch">
                                                                    重置
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- Bootstrap Table -->
                                                <table id="table" class="table table-striped table-bordered table-hover" width="100%"></table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
</body>
</html>
