<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>用户档案编辑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {
                        "backend": "zh-cn",
                        "frontend": "zh-cn"
                    }
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "iam",
                "controllername": "userprofile",
                "actionname": "edit",
                "jsname": "backend/iam/userprofile",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside is-dialog">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>用户档案编辑</h1>
                        </section>
                        <div class="content">
                            <form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST">
                                <input type="hidden" name="id" id="id" value="" />

                                <div class="form-group">
                                    <label for="nickname" class="control-label col-xs-12 col-sm-2">昵称 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="nickname" name="nickname" value="" placeholder="请输入昵称" data-rule="required" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="realName" class="control-label col-xs-12 col-sm-2">真实姓名</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="realName" name="realName" value="" placeholder="请输入真实姓名" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="departmentId" class="control-label col-xs-12 col-sm-2">所属部门</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control selectpicker" id="departmentId" name="departmentId">
                                            <option value="">请选择部门</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="postId" class="control-label col-xs-12 col-sm-2">岗位</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control selectpicker" id="postId" name="postId">
                                            <option value="">请选择岗位</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="phone" class="control-label col-xs-12 col-sm-2">手机号</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="phone" name="phone" value="" placeholder="请输入手机号" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="email" class="control-label col-xs-12 col-sm-2">邮箱</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="email" class="form-control" id="email" name="email" value="" placeholder="请输入邮箱" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="gender" class="control-label col-xs-12 col-sm-2">性别</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control" id="gender" name="gender">
                                            <option value="">未知</option>
                                            <option value="male">男</option>
                                            <option value="female">女</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="birthday" class="control-label col-xs-12 col-sm-2">出生日期</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="birthday" name="birthday" value="" placeholder="请选择出生日期" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="avatar" class="control-label col-xs-12 col-sm-2">头像</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="avatar" name="avatar" value="" placeholder="请输入头像URL" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="status" class="control-label col-xs-12 col-sm-2">状态</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <label class="radio-inline">
                                            <input type="radio" name="status" value="true" checked /> 正常
                                        </label>
                                        <label class="radio-inline">
                                            <input type="radio" name="status" value="false" /> 禁用
                                        </label>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="remark" class="control-label col-xs-12 col-sm-2">备注</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="请输入备注"></textarea>
                                    </div>
                                </div>

                                <div class="form-group hidden layer-footer">
                                    <label class="control-label col-xs-12 col-sm-2"></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <button type="submit" class="btn btn-success btn-embossed">确定</button>
                                        <button type="reset" class="btn btn-default btn-embossed">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
</body>
</html>
