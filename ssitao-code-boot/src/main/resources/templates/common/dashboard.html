<!DOCTYPE html>
<html lang="zh-cn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>控制台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" th:href="@{/assets/img/favicon.ico}" href="/assets/img/favicon.ico" />
    <link th:href="@{/assets/css/backend.min.css}" href="/assets/css/backend.min.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.js"></script>
    <![endif]-->

    <script th:inline="javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": [[@{/}]],
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai"
                },
                "modulename": "admin",
                "controllername": "dashboard",
                "actionname": "index",
                "jsname": "backend/dashboard"
            }
        };
    </script>

    <style type="text/css">
        .sm-st {
            background: #fff;
            padding: 20px;
            -webkit-border-radius: 3px;
            -moz-border-radius: 3px;
            border-radius: 3px;
            margin-bottom: 20px;
            -webkit-box-shadow: 0 1px 0px rgba(0,0,0,0.05);
            box-shadow: 0 1px 0px rgba(0,0,0,0.05);
        }
        .sm-st-icon {
            width: 60px;
            height: 60px;
            display: inline-block;
            line-height: 60px;
            text-align: center;
            font-size: 30px;
            background: #eee;
            -webkit-border-radius: 5px;
            -moz-border-radius: 5px;
            border-radius: 5px;
            float: left;
            margin-right: 10px;
            color: #fff;
        }
        .sm-st-info {
            font-size: 12px;
            padding-top: 2px;
        }
        .sm-st-info span {
            display: block;
            font-size: 24px;
            font-weight: 600;
        }
        .st-red { background-color: #F05050; }
        .st-green { background-color: #27C24C; }
        .st-violet { background-color: #7266ba; }
        .st-blue { background-color: #23b7e5; }

        .stats .stat-icon {
            color: #28bb9c;
            display: inline-block;
            font-size: 26px;
            text-align: center;
            vertical-align: middle;
            width: 50px;
            float: left;
        }
        .stat {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
            margin-right: 10px;
        }
        .stat .value {
            font-size: 20px;
            line-height: 24px;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .stat .name {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-col .progress { height: 2px; }
        .stat-col .progress-bar { line-height: 2px; height: 2px; }
    </style>
</head>

<body class="inside-header inside-aside">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>
                                控制台
                                <small>Control panel</small>
                            </h1>
                        </section>

                        <!-- RIBBON -->
                        <div id="ribbon">
                            <ol class="breadcrumb pull-left">
                                <li><a th:href="@{/dashboard}" class="addtabsit"><i class="fa fa-dashboard"></i> 控制台</a></li>
                            </ol>
                        </div>
                        <!-- END RIBBON -->

                        <div class="content">
                            <div class="panel panel-default panel-intro">
                                <div class="panel-heading">
                                    <div class="panel-lead">
                                        <em>控制台（Dashboard）</em>用于展示当前系统中的统计数据、统计报表及重要实时数据
                                    </div>
                                    <ul class="nav nav-tabs">
                                        <li class="active"><a href="#one" data-toggle="tab">控制台</a></li>
                                    </ul>
                                </div>
                                <div class="panel-body">
                                    <div id="myTabContent" class="tab-content">
                                        <div class="tab-pane fade active in" id="one">
                                            <!-- 统计卡片 -->
                                            <div class="row">
                                                <div class="col-sm-3 col-xs-6">
                                                    <div class="sm-st clearfix">
                                                        <span class="sm-st-icon st-red"><i class="fa fa-users"></i></span>
                                                        <div class="sm-st-info">
                                                            <span th:text="${totalUsers}">35200</span>
                                                            总会员数
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-sm-3 col-xs-6">
                                                    <div class="sm-st clearfix">
                                                        <span class="sm-st-icon st-violet"><i class="fa fa-book"></i></span>
                                                        <div class="sm-st-info">
                                                            <span th:text="${totalVisits}">219390</span>
                                                            总访问数
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-sm-3 col-xs-6">
                                                    <div class="sm-st clearfix">
                                                        <span class="sm-st-icon st-blue"><i class="fa fa-shopping-bag"></i></span>
                                                        <div class="sm-st-info">
                                                            <span th:text="${totalOrders}">32143</span>
                                                            总订单数
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-sm-3 col-xs-6">
                                                    <div class="sm-st clearfix">
                                                        <span class="sm-st-icon st-green"><i class="fa fa-cny"></i></span>
                                                        <div class="sm-st-info">
                                                            <span th:text="${totalAmount}">174800</span>
                                                            总金额
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- 图表区域 -->
                                            <div class="row">
                                                <div class="col-lg-8">
                                                    <div id="echart" style="height:300px;width:100%;"></div>
                                                </div>
                                                <div class="col-lg-4">
                                                    <div class="card sameheight-item stats">
                                                        <div class="card-block">
                                                            <div class="row row-sm stats-container">
                                                                <div class="col-xs-6 stat-col">
                                                                    <div class="stat-icon"><i class="fa fa-rocket"></i></div>
                                                                    <div class="stat">
                                                                        <div class="value">430</div>
                                                                        <div class="name">今日注册</div>
                                                                    </div>
                                                                    <div class="progress">
                                                                        <div class="progress-bar progress-bar-success" style="width: 20%"></div>
                                                                    </div>
                                                                </div>
                                                                <div class="col-xs-6 stat-col">
                                                                    <div class="stat-icon"><i class="fa fa-user"></i></div>
                                                                    <div class="stat">
                                                                        <div class="value">321</div>
                                                                        <div class="name">今日登录</div>
                                                                    </div>
                                                                    <div class="progress">
                                                                        <div class="progress-bar progress-bar-success" style="width: 20%"></div>
                                                                    </div>
                                                                </div>
                                                                <div class="col-xs-6 stat-col">
                                                                    <div class="stat-icon"><i class="fa fa-line-chart"></i></div>
                                                                    <div class="stat">
                                                                        <div class="value">2324</div>
                                                                        <div class="name">今日订单</div>
                                                                    </div>
                                                                    <div class="progress">
                                                                        <div class="progress-bar progress-bar-success" style="width: 20%"></div>
                                                                    </div>
                                                                </div>
                                                                <div class="col-xs-6 stat-col">
                                                                    <div class="stat-icon"><i class="fa fa-list-alt"></i></div>
                                                                    <div class="stat">
                                                                        <div class="value">80%</div>
                                                                        <div class="name">七日新增</div>
                                                                    </div>
                                                                    <div class="progress">
                                                                        <div class="progress-bar progress-bar-success" style="width: 20%"></div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- 快捷操作 -->
                                            <div class="row" style="margin-top:15px;">
                                                <div class="col-lg-12">
                                                    <h4>快捷操作</h4>
                                                </div>
                                                <div class="col-xs-6 col-md-3">
                                                    <div class="panel bg-blue">
                                                        <div class="panel-body">
                                                            <div class="panel-title">
                                                                <h5><i class="fa fa-user"></i> 用户管理</h5>
                                                            </div>
                                                            <div class="panel-content">
                                                                <p>管理系统用户账号</p>
                                                                <a th:href="@{/admin/admin}" class="btn btn-sm btn-default">进入</a>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-xs-6 col-md-3">
                                                    <div class="panel bg-aqua-gradient">
                                                        <div class="panel-body">
                                                            <div class="panel-title">
                                                                <h5><i class="fa fa-cog"></i> 系统配置</h5>
                                                            </div>
                                                            <div class="panel-content">
                                                                <p>配置系统参数</p>
                                                                <a th:href="@{/admin/config}" class="btn btn-sm btn-default">进入</a>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-xs-6 col-md-3">
                                                    <div class="panel bg-purple-gradient">
                                                        <div class="panel-body">
                                                            <div class="panel-title">
                                                                <h5><i class="fa fa-group"></i> 角色权限</h5>
                                                            </div>
                                                            <div class="panel-content">
                                                                <p>管理角色和权限</p>
                                                                <a th:href="@{/admin/group}" class="btn btn-sm btn-default">进入</a>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-xs-6 col-md-3">
                                                    <div class="panel bg-green-gradient">
                                                        <div class="panel-body">
                                                            <div class="panel-title">
                                                                <h5><i class="fa fa-file"></i> 内容管理</h5>
                                                            </div>
                                                            <div class="panel-content">
                                                                <p>管理单页和分类</p>
                                                                <a th:href="@{/admin/page}" class="btn btn-sm btn-default">进入</a>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/assets/js/require.js}" src="/assets/js/require.js"
            th:attr="data-main=@{/assets/js/require-backend.js}"></script>
    <script th:inline="javascript">
        // ECharts 图表数据
        var Orderdata = {
            column: ["2024-01-01", "2024-01-02", "2024-01-03", "2024-01-04", "2024-01-05", "2024-01-06", "2024-01-07"],
            paydata: [16, 28, 60, 70, 56, 4, 25],
            createdata: [48, 130, 192, 151, 72, 56, 191],
        };
    </script>
</body>
</html>
