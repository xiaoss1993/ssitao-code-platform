<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>字段管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {"backend": "zh-cn", "frontend": "zh-cn"}
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "meta",
                "controllername": "column",
                "actionname": "index",
                "jsname": "backend/meta/column",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>字段管理</h1>
                        </section>
                        <div id="ribbon">
                            <ol class="breadcrumb pull-left">
                                <li><a href="/console" class="addtabsit"><i class="fa fa-dashboard"></i> 控制台</a></li>
                                <li><a href="javascript:;" data-url="meta">元数据管理</a></li>
                                <li><a href="javascript:;" data-url="meta/column">字段管理</a></li>
                            </ol>
                        </div>
                        <div class="content">
                            <div class="panel panel-default panel-intro">
                                <div class="panel-body">
                                    <div id="myTabContent" class="tab-content">
                                        <div class="tab-pane fade active in" id="one">
                                            <div class="widget-body no-padding">
                                                <div id="toolbar" class="toolbar">
                                                    <a href="javascript:;" class="btn btn-success btn-add" title="添加">
                                                        <i class="fa fa-plus"></i> 添加
                                                    </a>
                                                    <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled" title="删除">
                                                        <i class="fa fa-trash"></i> 删除
                                                    </a>
                                                    <a href="javascript:;" class="btn btn-primary btn-refresh" title="刷新">
                                                        <i class="fa fa-refresh"></i>
                                                    </a>
                                                </div>
                                                <table id="table" class="table table-striped table-bordered table-hover" width="100%">
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
    <script>
        $(function() {
            var table = $("#table");
            table.bootstrapTable({
                url: $.fn.bootstrapTable.defaults.extend.list_url,
                pk: 'columnId',
                sortName: 'columnSort',
                columns: [
                    [
                        {checkbox: true},
                        {field: 'columnId', title: '字段ID', visible: false},
                        {field: 'tableId', title: '表ID', visible: false},
                        {field: 'columnName', title: '字段名称', sortable: true},
                        {field: 'columnDesc', title: '字段描述', sortable: false},
                        {field: 'columnType', title: '字段类型', sortable: true},
                        {field: 'javaType', title: 'Java类型', sortable: true},
                        {field: 'javaField', title: 'Java字段名', sortable: true},
                        {
                            field: 'isPk',
                            title: '主键',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ? '<span class="label label-success">是</span>' : '<span class="label label-default">否</span>';
                            }
                        },
                        {
                            field: 'isRequired',
                            title: '必填',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ? '<span class="label label-success">是</span>' : '<span class="label label-default">否</span>';
                            }
                        },
                        {
                            field: 'isQuery',
                            title: '查询',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ? '<span class="label label-success">是</span>' : '<span class="label label-default">否</span>';
                            }
                        },
                        {
                            field: 'isList',
                            title: '列表',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ? '<span class="label label-success">是</span>' : '<span class="label label-default">否</span>';
                            }
                        },
                        {
                            field: 'isForm',
                            title: '表单',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ? '<span class="label label-success">是</span>' : '<span class="label label-default">否</span>';
                            }
                        },
                        {
                            field: 'columnSort',
                            title: '排序',
                            sortable: true
                        },
                        {
                            field: 'operate',
                            title: '操作',
                            width: '150px',
                            events: {
                                'click .btn-edit': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '编辑字段',
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['700px', '80%'],
                                        content: '/meta/column-edit.html?id=' + row.columnId + '&tableId=' + row.tableId
                                    });
                                }
                            },
                            formatter: function(value, row, index) {
                                return '<a href="javascript:;" class="btn btn-success btn-edit btn-xs"><i class="fa fa-edit"></i> 编辑</a> ' +
                                       '<a href="javascript:;" class="btn btn-danger btn-del btn-xs"><i class="fa fa-trash"></i> 删除</a>';
                            }
                        }
                    ]
                ]
            });

            // 绑定按钮事件
            table.on('load-success.bs.table', function() {
                // 添加按钮
                $('.btn-add').on('click', function() {
                    var tableId = getQueryString('tableId') || '';
                    Layer.open({
                        type: 2,
                        title: '添加字段',
                        shadeClose: true,
                        shade: 0.3,
                        area: ['700px', '80%'],
                        content: '/meta/column-edit.html' + (tableId ? '?tableId=' + tableId : '')
                    });
                });

                // 删除按钮
                $('.btn-del').on('click', function() {
                    var ids = $.fn.bootstrapTable.defaults.extend.getIdSelections("#table");
                    if (ids.length === 0) {
                        Layer.msg('请至少选择一条记录', {icon: 2});
                        return false;
                    }
                    Layer.confirm('确认删除选中的记录吗？', {icon: 3, title: '提示'}, function(index) {
                        $.ajax({
                            url: '/meta/column/delete',
                            type: 'DELETE',
                            data: { columnId: ids[0] },
                            dataType: 'json',
                            success: function(res) {
                                if (res.code === 200) {
                                    Layer.msg('删除成功', {icon: 1});
                                    $("#table").bootstrapTable('refresh');
                                } else {
                                    Layer.msg(res.msg || '删除失败', {icon: 2});
                                }
                            }
                        });
                        Layer.close(index);
                    });
                });

                // 刷新按钮
                $('.btn-refresh').on('click', function() {
                    $("#table").bootstrapTable('refresh');
                });
            });

            // 获取URL参数
            function getQueryString(name) {
                var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
                var r = window.location.search.substr(1).match(reg);
                if (r != null) return decodeURIComponent(r[2]);
                return null;
            }

            // 如果有tableId参数，自动过滤
            var tableId = getQueryString('tableId');
            if (tableId) {
                table.bootstrapTable('refresh', { url: '/meta/column/list?tableId=' + tableId });
            }
        });

        // 扩展配置
        require.config({
            paths: {
                "backend/meta/column": "//localhost/js/backend/meta/column"
            }
        });
    </script>
</body>
</html>
