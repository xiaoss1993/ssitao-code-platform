<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>元数据表管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {"backend": "zh-cn", "frontend": "zh-cn"}
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "meta",
                "controllername": "table",
                "actionname": "index",
                "jsname": "backend/meta/table",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>元数据表管理</h1>
                        </section>
                        <div id="ribbon">
                            <ol class="breadcrumb pull-left">
                                <li><a href="/console" class="addtabsit"><i class="fa fa-dashboard"></i> 控制台</a></li>
                                <li><a href="javascript:;" data-url="meta">元数据管理</a></li>
                                <li><a href="javascript:;" data-url="meta/table">元数据表管理</a></li>
                            </ol>
                        </div>
                        <div class="content">
                            <div class="panel panel-default panel-intro">
                                <div class="panel-body">
                                    <div id="myTabContent" class="tab-content">
                                        <div class="tab-pane fade active in" id="one">
                                            <div class="widget-body no-padding">
                                                <div id="toolbar" class="toolbar">
                                                    <a href="javascript:;" class="btn btn-success btn-add" title="添加">
                                                        <i class="fa fa-plus"></i> 添加
                                                    </a>
                                                    <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled" title="删除">
                                                        <i class="fa fa-trash"></i> 删除
                                                    </a>
                                                    <a href="javascript:;" class="btn btn-primary btn-refresh" title="刷新">
                                                        <i class="fa fa-refresh"></i>
                                                    </a>
                                                </div>
                                                <table id="table" class="table table-striped table-bordered table-hover" width="100%">
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
    <script>
        $(function() {
            var table = $("#table");
            table.bootstrapTable({
                url: '/meta/table/list',
                pk: 'id',
                sortName: 'createTime',
                columns: [
                    [
                        {checkbox: true},
                        {field: 'id', title: '表ID', visible: false},
                        {field: 'tableName', title: '表名称', sortable: true},
                        {field: 'tableDesc', title: '表描述', sortable: false},
                        {field: 'tableType', title: '表类型', sortable: true,
                            formatter: function(value, row, index) {
                                var typeMap = {1: '业务表', 2: '字典表', 3: '树形表', 4: '关联表'};
                                return typeMap[value] || '未知';
                            }
                        },
                        {field: 'className', title: '类名', sortable: true},
                        {field: 'classDesc', title: '类描述', sortable: false},
                        {field: 'moduleName', title: '模块名', sortable: true},
                        {field: 'author', title: '作者', sortable: true},
                        {
                            field: 'enabled',
                            title: '状态',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === true || value === 1 ?
                                    '<span class="label label-success">启用</span>' :
                                    '<span class="label label-default">禁用</span>';
                            }
                        },
                        {
                            field: 'generated',
                            title: '已生成',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === true || value === 1 ?
                                    '<span class="label label-success">是</span>' :
                                    '<span class="label label-default">否</span>';
                            }
                        },
                        {
                            field: 'createTime',
                            title: '创建时间',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value ? new Date(value).toLocaleString() : '-';
                            }
                        },
                        {
                            field: 'operate',
                            title: '操作',
                            width: '200px',
                            events: {
                                'click .btn-edit': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '编辑表',
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['700px', '80%'],
                                        content: '/meta/table-edit.html?id=' + row.id
                                    });
                                },
                                'click .btn-column': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '管理字段 - ' + row.tableName,
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['90%', '80%'],
                                        content: '/meta/column.html?tableId=' + row.id
                                    });
                                },
                                'click .btn-generate': function(e, value, row, index) {
                                    Layer.confirm('确认生成代码吗？', {icon: 3, title: '提示'}, function(index) {
                                        $.ajax({
                                            url: '/meta/table/generate/' + row.id,
                                            type: 'POST',
                                            dataType: 'json',
                                            success: function(res) {
                                                if (res.code === 200) {
                                                    Layer.msg('生成成功', {icon: 1});
                                                    $("#table").bootstrapTable('refresh');
                                                } else {
                                                    Layer.msg(res.msg || '生成失败', {icon: 2});
                                                }
                                            }
                                        });
                                        Layer.close(index);
                                    });
                                }
                            },
                            formatter: function(value, row, index) {
                                return '<a href="javascript:;" class="btn btn-success btn-edit btn-xs"><i class="fa fa-edit"></i> 编辑</a> ' +
                                       '<a href="javascript:;" class="btn btn-info btn-column btn-xs"><i class="fa fa-list"></i> 字段</a> ' +
                                       '<a href="javascript:;" class="btn btn-warning btn-generate btn-xs"><i class="fa fa-code"></i> 生成</a>';
                            }
                        }
                    ]
                ]
            });

            // 绑定按钮事件
            table.on('load-success.bs.table', function() {
                // 添加按钮
                $('.btn-add').on('click', function() {
                    Layer.open({
                        type: 2,
                        title: '添加元数据表',
                        shadeClose: true,
                        shade: 0.3,
                        area: ['700px', '80%'],
                        content: '/meta/table-edit.html'
                    });
                });

                // 删除按钮
                $('.btn-del').on('click', function() {
                    var ids = $.fn.bootstrapTable.defaults.extend.getIdSelections("#table");
                    if (ids.length === 0) {
                        Layer.msg('请至少选择一条记录', {icon: 2});
                        return false;
                    }
                    Layer.confirm('确认删除选中的记录吗？', {icon: 3, title: '提示'}, function(index) {
                        $.ajax({
                            url: '/meta/table/' + ids[0],
                            type: 'DELETE',
                            dataType: 'json',
                            success: function(res) {
                                if (res.code === 200) {
                                    Layer.msg('删除成功', {icon: 1});
                                    $("#table").bootstrapTable('refresh');
                                } else {
                                    Layer.msg(res.msg || '删除失败', {icon: 2});
                                }
                            }
                        });
                        Layer.close(index);
                    });
                });

                // 刷新按钮
                $('.btn-refresh').on('click', function() {
                    $("#table").bootstrapTable('refresh');
                });
            });
        });
    </script>
</body>
</html>
