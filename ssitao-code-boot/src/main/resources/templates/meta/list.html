<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>元数据列表配置</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {"backend": "zh-cn", "frontend": "zh-cn"}
                },
                "modulename": "meta",
                "controllername": "list",
                "actionname": "index",
                "jsname": "backend/meta/list",
                "moduleurl": "/",
                "language": "zh-cn"
            }
        };
    </script>
</head>

<body class="inside-header inside-aside">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>元数据列表配置</h1>
                        </section>
                        <div id="ribbon">
                            <ol class="breadcrumb pull-left">
                                <li><a href="/console" class="addtabsit"><i class="fa fa-dashboard"></i> 控制台</a></li>
                                <li><a href="javascript:;" data-url="meta">元数据管理</a></li>
                                <li><a href="javascript:;" data-url="meta/list">元数据列表配置</a></li>
                            </ol>
                        </div>
                        <div class="content">
                            <div class="panel panel-default panel-intro">
                                <div class="panel-body">
                                    <div id="myTabContent" class="tab-content">
                                        <div class="tab-pane fade active in" id="one">
                                            <div class="widget-body no-padding">
                                                <div id="toolbar" class="toolbar">
                                                    <a href="javascript:;" class="btn btn-success btn-add" title="添加">
                                                        <i class="fa fa-plus"></i> 添加
                                                    </a>
                                                    <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled" title="删除">
                                                        <i class="fa fa-trash"></i> 删除
                                                    </a>
                                                    <a href="javascript:;" class="btn btn-primary btn-refresh" title="刷新">
                                                        <i class="fa fa-refresh"></i>
                                                    </a>
                                                </div>
                                                <table id="table" class="table table-striped table-bordered table-hover" width="100%">
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
    <script>
        $(function() {
            var table = $("#table");
            table.bootstrapTable({
                url: '/meta/list/list',
                pk: 'listId',
                sortName: 'createTime',
                columns: [
                    [
                        {checkbox: true},
                        {field: 'listId', title: '列表ID', visible: false},
                        {field: 'listCode', title: '列表编码', sortable: true},
                        {field: 'listName', title: '列表名称', sortable: true},
                        {field: 'listType', title: '列表类型', sortable: true,
                            formatter: function(value, row, index) {
                                var typeMap = {1: '默认列表', 2: '树形列表', 3: '表格列表', 4: '分组列表'};
                                return typeMap[value] || '未知';
                            }
                        },
                        {field: 'rowStyle', title: '行样式', sortable: true,
                            formatter: function(value, row, index) {
                                var styleMap = {1: '默认', 2: '紧凑', 3: '舒适'};
                                return styleMap[value] || '默认';
                            }
                        },
                        {field: 'defaultPageSize', title: '默认分页', sortable: false},
                        {
                            field: 'showPagination',
                            title: '分页',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ?
                                    '<span class="label label-success">显示</span>' :
                                    '<span class="label label-default">隐藏</span>';
                            }
                        },
                        {
                            field: 'showToolbar',
                            title: '工具栏',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ?
                                    '<span class="label label-success">显示</span>' :
                                    '<span class="label label-default">隐藏</span>';
                            }
                        },
                        {
                            field: 'status',
                            title: '状态',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value === 1 ?
                                    '<span class="label label-success">启用</span>' :
                                    '<span class="label label-default">禁用</span>';
                            }
                        },
                        {
                            field: 'createTime',
                            title: '创建时间',
                            sortable: true,
                            formatter: function(value, row, index) {
                                return value ? new Date(value).toLocaleString() : '-';
                            }
                        },
                        {
                            field: 'operate',
                            title: '操作',
                            width: '200px',
                            events: {
                                'click .btn-edit': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '编辑列表',
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['800px', '80%'],
                                        content: '/meta/list-edit.html?id=' + row.listId
                                    });
                                },
                                'click .btn-column': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '管理列 - ' + row.listName,
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['90%', '80%'],
                                        content: '/meta/list-column.html?listId=' + row.listId
                                    });
                                },
                                'click .btn-button': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '管理按钮 - ' + row.listName,
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['90%', '80%'],
                                        content: '/meta/list-button.html?listId=' + row.listId
                                    });
                                },
                                'click .btn-query': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '管理查询条件 - ' + row.listName,
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['90%', '80%'],
                                        content: '/meta/list-query.html?listId=' + row.listId
                                    });
                                },
                                'click .btn-copy': function(e, value, row, index) {
                                    Layer.open({
                                        type: 2,
                                        title: '复制列表 - ' + row.listName,
                                        shadeClose: true,
                                        shade: 0.3,
                                        area: ['800px', '80%'],
                                        content: '/meta/list-edit.html?id=' + row.listId + '&copy=1'
                                    });
                                }
                            },
                            formatter: function(value, row, index) {
                                return '<a href="javascript:;" class="btn btn-success btn-edit btn-xs"><i class="fa fa-edit"></i> 编辑</a> ' +
                                       '<a href="javascript:;" class="btn btn-info btn-column btn-xs"><i class="fa fa-list"></i> 列</a> ' +
                                       '<a href="javascript:;" class="btn btn-warning btn-button btn-xs"><i class="fa fa-button"></i> 按钮</a> ' +
                                       '<a href="javascript:;" class="btn btn-primary btn-query btn-xs"><i class="fa fa-search"></i> 查询</a>';
                            }
                        }
                    ]
                ]
            });

            table.on('load-success.bs.table', function() {
                $('.btn-add').on('click', function() {
                    Layer.open({
                        type: 2,
                        title: '添加元数据列表',
                        shadeClose: true,
                        shade: 0.3,
                        area: ['800px', '80%'],
                        content: '/meta/list-edit.html'
                    });
                });

                $('.btn-del').on('click', function() {
                    var ids = $.fn.bootstrapTable.defaults.extend.getIdSelections("#table");
                    if (ids.length === 0) {
                        Layer.msg('请至少选择一条记录', {icon: 2});
                        return false;
                    }
                    Layer.confirm('确认删除选中的记录吗？', {icon: 3, title: '提示'}, function(index) {
                        $.ajax({
                            url: '/meta/list/delete',
                            type: 'DELETE',
                            data: {listId: ids[0]},
                            dataType: 'json',
                            success: function(res) {
                                if (res.code === 200) {
                                    Layer.msg('删除成功', {icon: 1});
                                    $("#table").bootstrapTable('refresh');
                                } else {
                                    Layer.msg(res.msg || '删除失败', {icon: 2});
                                }
                            }
                        });
                        Layer.close(index);
                    });
                });

                $('.btn-refresh').on('click', function() {
                    $("#table").bootstrapTable('refresh');
                });
            });
        });
    </script>
</body>
</html>
