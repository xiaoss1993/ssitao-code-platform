<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>岗位编辑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai"
                },
                "modulename": "hr",
                "controllername": "position",
                "actionname": "edit",
                "jsname": "backend/hr/position",
                "moduleurl": "/"
            }
        };
    </script>
</head>

<body class="inside-header inside-aside" style="background-color: #fff;">
    <form id="edit-form" class="form-horizontal" role="form" method="POST">
        <input type="hidden" name="id" id="id" value="">
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">所属部门:</label>
            <div class="col-xs-12 col-sm-8">
                <select class="form-control" name="deptId" id="deptId" required>
                    <option value="">请选择部门</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">岗位编码:</label>
            <div class="col-xs-12 col-sm-8">
                <input type="text" class="form-control" name="positionCode" id="positionCode" placeholder="请输入岗位编码" required>
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">岗位名称:</label>
            <div class="col-xs-12 col-sm-8">
                <input type="text" class="form-control" name="positionName" id="positionName" placeholder="请输入岗位名称" required>
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">职级:</label>
            <div class="col-xs-12 col-sm-8">
                <select class="form-control" name="positionLevel" id="positionLevel">
                    <option value="P1">P1-初级</option>
                    <option value="P2">P2-中级</option>
                    <option value="P3">P3-高级</option>
                    <option value="P4">P4-专家</option>
                    <option value="P5">P5-资深专家</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">显示顺序:</label>
            <div class="col-xs-12 col-sm-8">
                <input type="number" class="form-control" name="sortOrder" id="sortOrder" value="0">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">状态:</label>
            <div class="col-xs-12 col-sm-8">
                <label class="radio-inline">
                    <input type="radio" name="status" value="1" checked> 启用
                </label>
                <label class="radio-inline">
                    <input type="radio" name="status" value="0"> 禁用
                </label>
            </div>
        </div>
        <div class="form-group layer-footer">
            <div class="col-xs-12 col-sm-8 col-sm-offset-2">
                <button type="submit" class="btn btn-success btn-embossed">提交</button>
                <button type="reset" class="btn btn-default btn-embossed">重置</button>
            </div>
        </div>
    </form>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
</body>
</html>
