<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>部门编辑 - HR人力资源</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0"
                },
                "modulename": "hr",
                "controllername": "department",
                "actionname": "edit",
                "jsname": "backend/hr/department",
                "moduleurl": "/hr/org"
            }
        };
    </script>
</head>

<body class="inside-header inside-aside">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <div class="content">
                            <form id="add-form" class="form-horizontal" role="form">
                                <div class="panel panel-default panel-intro">
                                    <div class="panel-heading">
                                        <div class="panel-lead">
                                            <em>部门信息</em>
                                        </div>
                                    </div>
                                    <div class="panel-body">
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">上级部门:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <input id="c-parentId" class="form-control" name="row[parentId]" type="text" value="0" />
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">部门编码:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <input id="c-deptCode" class="form-control" name="row[deptCode]" type="text" />
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">部门名称:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <input id="c-deptName" class="form-control" name="row[deptName]" type="text" />
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">部门负责人:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <input id="c-deptLeader" class="form-control" name="row[deptLeader]" type="text" />
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">联系电话:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <input id="c-phone" class="form-control" name="row[phone]" type="text" />
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">邮箱:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <input id="c-email" class="form-control" name="row[email]" type="text" />
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">排序:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <input id="c-deptSort" class="form-control" name="row[deptSort]" type="number" value="0" />
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="control-label col-xs-12 col-sm-2">状态:</label>
                                            <div class="col-xs-12 col-sm-8">
                                                <select id="c-status" class="form-control selectpicker" name="row[status]">
                                                    <option value="NORMAL">正常</option>
                                                    <option value="DISABLED">停用</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group layer-footer">
                                    <div class="col-xs-12 col-sm-8 col-sm-offset-2">
                                        <input type="hidden" name="row[id]" id="id" />
                                        <input type="hidden" name="row[tenantId]" id="tenantId" value="1" />
                                        <button type="submit" class="btn btn-success btn-embossed">提交</button>
                                        <button type="reset" class="btn btn-default btn-embossed">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/require.js" data-main="/assets/js/backend.js"></script>
    <script>
        require.config({
            paths: {
                'backend/hr/department': '/assets/js/backend/hr/department'
            }
        });
    </script>
</body>
</html>
