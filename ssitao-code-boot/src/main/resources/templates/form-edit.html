<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>元数据表单编辑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {"backend": "zh-cn", "frontend": "zh-cn"}
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "meta",
                "controllername": "form",
                "actionname": "edit",
                "jsname": "backend/meta/form",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside is-dialog">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>元数据表单编辑</h1>
                        </section>
                        <div class="content">
                            <form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST">
                                <input type="hidden" name="formId" id="formId" value="" />
                                <input type="hidden" name="entityId" id="entityId" value="" />

                                <div class="form-group">
                                    <label for="entityIdSelect" class="control-label col-xs-12 col-sm-2">所属实体 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control" id="entityIdSelect" name="entityIdSelect" data-rule="required">
                                            <option value="">请选择实体</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="formCode" class="control-label col-xs-12 col-sm-2">表单编码 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="formCode" name="formCode" value="" placeholder="请输入表单编码" data-rule="required" />
                                        <span class="help-block">表单的唯一标识，如 user_form</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="formName" class="control-label col-xs-12 col-sm-2">表单名称 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="formName" name="formName" value="" placeholder="请输入表单名称" data-rule="required" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="formType" class="control-label col-xs-12 col-sm-2">表单类型</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control" id="formType" name="formType">
                                            <option value="1">默认表单</option>
                                            <option value="2">弹窗表单</option>
                                            <option value="3">抽屉表单</option>
                                            <option value="4">步骤表单</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="layout" class="control-label col-xs-12 col-sm-2">表单布局</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control" id="layout" name="layout">
                                            <option value="1">单列</option>
                                            <option value="2">双列</option>
                                            <option value="3">三列</option>
                                            <option value="4">四列</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="width" class="control-label col-xs-12 col-sm-2">表单宽度</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="number" class="form-control" id="width" name="width" value="600" placeholder="请输入表单宽度" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="labelPosition" class="control-label col-xs-12 col-sm-2">标签位置</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control" id="labelPosition" name="labelPosition">
                                            <option value="1">左侧</option>
                                            <option value="2">上方</option>
                                            <option value="3">右侧</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="labelWidth" class="control-label col-xs-12 col-sm-2">标签宽度</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="number" class="form-control" id="labelWidth" name="labelWidth" value="100" placeholder="请输入标签宽度" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="control-label col-xs-12 col-sm-2">操作按钮</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <div class="checkbox">
                                            <label>
                                                <input type="checkbox" name="showButtons" id="showButtons" value="1" checked /> 显示操作按钮
                                            </label>
                                        </div>
                                        <div class="checkbox">
                                            <label>
                                                <input type="checkbox" name="showResetButton" id="showResetButton" value="1" checked /> 显示重置按钮
                                            </label>
                                        </div>
                                        <div class="checkbox">
                                            <label>
                                                <input type="checkbox" name="showCancelButton" id="showCancelButton" value="1" checked /> 显示取消按钮
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="submitButtonText" class="control-label col-xs-12 col-sm-2">提交按钮文本</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="submitButtonText" name="submitButtonText" value="提交" placeholder="请输入提交按钮文本" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="submitAction" class="control-label col-xs-12 col-sm-2">提交后行为</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control" id="submitAction" name="submitAction">
                                            <option value="1">关闭弹窗</option>
                                            <option value="2">刷新列表</option>
                                            <option value="3">跳转页面</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="redirectPath" class="control-label col-xs-12 col-sm-2">跳转页面路径</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="redirectPath" name="redirectPath" value="" placeholder="请输入跳转页面路径" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="control-label col-xs-12 col-sm-2">状态</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <div class="checkbox">
                                            <label>
                                                <input type="checkbox" name="status" id="status" value="1" checked /> 启用
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="remark" class="control-label col-xs-12 col-sm-2">备注</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="请输入备注"></textarea>
                                    </div>
                                </div>

                                <div class="form-group hidden layer-footer">
                                    <label class="control-label col-xs-12 col-sm-2"></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <button type="submit" class="btn btn-success btn-embossed">确定</button>
                                        <button type="reset" class="btn btn-default btn-embossed">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
    <script>
        function getQueryString(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }

        $(function() {
            var id = getQueryString('id');
            var copy = getQueryString('copy');

            // 加载实体列表
            $.ajax({
                url: '/meta/table/list',
                type: 'GET',
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200 && res.rows) {
                        var options = '<option value="">请选择实体</option>';
                        res.rows.forEach(function(table) {
                            options += '<option value="' + table.id + '">' + table.tableName + ' - ' + (table.tableDesc || '') + '</option>';
                        });
                        $('#entityIdSelect').html(options);
                    }
                }
            });

            if (id) {
                // 编辑模式
                $.ajax({
                    url: '/meta/form/get',
                    type: 'GET',
                    data: {formId: id},
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var data = res.data;
                            $('#formId').val(data.formId);
                            $('#entityId').val(data.entityId);
                            $('#entityIdSelect').val(data.entityId);
                            $('#formCode').val(data.formCode);
                            $('#formName').val(data.formName);
                            $('#formType').val(data.formType || 1);
                            $('#layout').val(data.layout || 1);
                            $('#width').val(data.width || 600);
                            $('#labelPosition').val(data.labelPosition || 1);
                            $('#labelWidth').val(data.labelWidth || 100);
                            $('#submitButtonText').val(data.submitButtonText || '提交');
                            $('#submitAction').val(data.submitAction || 1);
                            $('#redirectPath').val(data.redirectPath || '');
                            $('#remark').val(data.remark || '');

                            if (data.showButtons === 1) {
                                $('#showButtons').prop('checked', true);
                            } else {
                                $('#showButtons').prop('checked', false);
                            }
                            if (data.showResetButton === 1) {
                                $('#showResetButton').prop('checked', true);
                            } else {
                                $('#showResetButton').prop('checked', false);
                            }
                            if (data.showCancelButton === 1) {
                                $('#showCancelButton').prop('checked', true);
                            } else {
                                $('#showCancelButton').prop('checked', false);
                            }
                            if (data.status === 1) {
                                $('#status').prop('checked', true);
                            } else {
                                $('#status').prop('checked', false);
                            }

                            // 如果是复制模式，清除ID
                            if (copy === '1') {
                                $('#formId').val('');
                                $('#formCode').val(data.formCode + '_copy');
                                $('#formName').val(data.formName + '(副本)');
                                $('#edit-form').attr('action', '/meta/form/create');
                                $('#edit-form').attr('method', 'POST');
                            } else {
                                $('#edit-form').attr('action', '/meta/form/update');
                                $('#edit-form').attr('method', 'PUT');
                            }
                        }
                    }
                });

                if (copy !== '1') {
                    $('#edit-form').attr('action', '/meta/form/update');
                    $('#edit-form').attr('method', 'PUT');
                } else {
                    $('#edit-form').attr('action', '/meta/form/create');
                    $('#edit-form').attr('method', 'POST');
                }
            } else {
                // 添加模式
                $('#edit-form').attr('action', '/meta/form/create');
                $('#edit-form').attr('method', 'POST');
            }

            $('#edit-form').on('submit', function(e) {
                e.preventDefault();
                var url = $(this).attr('action');
                var method = $(this).attr('method');

                var formData = {
                    entityId: $('#entityIdSelect').val(),
                    formCode: $('#formCode').val(),
                    formName: $('#formName').val(),
                    formType: parseInt($('#formType').val()),
                    layout: parseInt($('#layout').val()),
                    width: parseInt($('#width').val()),
                    labelPosition: parseInt($('#labelPosition').val()),
                    labelWidth: parseInt($('#labelWidth').val()),
                    showButtons: $('#showButtons').is(':checked') ? 1 : 0,
                    showResetButton: $('#showResetButton').is(':checked') ? 1 : 0,
                    showCancelButton: $('#showCancelButton').is(':checked') ? 1 : 0,
                    submitButtonText: $('#submitButtonText').val(),
                    submitAction: parseInt($('#submitAction').val()),
                    redirectPath: $('#redirectPath').val(),
                    status: $('#status').is(':checked') ? 1 : 0,
                    remark: $('#remark').val()
                };

                if (id && copy !== '1') {
                    formData.formId = id;
                }

                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200) {
                            Layer.msg('操作成功', {icon: 1});
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                            parent.$("#table").bootstrapTable('refresh');
                        } else {
                            Layer.msg(res.msg || '操作失败', {icon: 2});
                        }
                    },
                    error: function() {
                        Layer.msg('网络错误', {icon: 2});
                    }
                });
            });
        });
    </script>
</body>
</html>
