<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>元数据表编辑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">

    <link rel="shortcut icon" href="/assets/img/favicon.ico" />
    <link href="/assets/css/backend.css" rel="stylesheet">

    <!--[if lt IE 9]>
    <script src="/assets/js/html5shiv.js"></script>
    <script src="/assets/js/respond.min.js"></script>
    <![endif]-->
    <script type="text/javascript">
        var require = {
            "config": {
                "site": {
                    "name": "SSITAO Code Platform",
                    "cdnurl": "/",
                    "version": "2.0.0",
                    "timezone": "Asia/Shanghai",
                    "languages": {"backend": "zh-cn", "frontend": "zh-cn"}
                },
                "upload": {
                    "cdnurl": "/",
                    "uploadurl": "/api/upload",
                    "bucket": "yourbucketname",
                    "maxsize": "10mb",
                    "mimetype": "*",
                    "multiple": false
                },
                "modulename": "meta",
                "controllername": "table",
                "actionname": "edit",
                "jsname": "backend/meta/table",
                "moduleurl": "/",
                "language": "zh-cn",
                "referer": null
            }
        };
    </script>
</head>

<body class="inside-header inside-aside is-dialog">
    <div id="main" role="main">
        <div class="tab-content tab-addtabs">
            <div id="content">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                        <section class="content-header hide">
                            <h1>元数据表编辑</h1>
                        </section>
                        <div class="content">
                            <form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST">
                                <input type="hidden" name="id" id="id" value="" />

                                <div class="form-group">
                                    <label for="tableName" class="control-label col-xs-12 col-sm-2">表名称 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="tableName" name="tableName" value="" placeholder="请输入表名称" data-rule="required" />
                                        <span class="help-block">数据库中的表名，如 sys_user</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="tableDesc" class="control-label col-xs-12 col-sm-2">表描述</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="tableDesc" name="tableDesc" value="" placeholder="请输入表描述" />
                                        <span class="help-block">表的中文描述</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="tableType" class="control-label col-xs-12 col-sm-2">表类型</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <select class="form-control" id="tableType" name="tableType">
                                            <option value="1">业务表</option>
                                            <option value="2">字典表</option>
                                            <option value="3">树形表</option>
                                            <option value="4">关联表</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="className" class="control-label col-xs-12 col-sm-2">类名 <span class="text-danger">*</span></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="className" name="className" value="" placeholder="请输入类名" data-rule="required" />
                                        <span class="help-block">Java类名（首字母大写），如 SysUser</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="classDesc" class="control-label col-xs-12 col-sm-2">类描述</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="classDesc" name="classDesc" value="" placeholder="请输入类描述" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="entityName" class="control-label col-xs-12 col-sm-2">实体名称</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="entityName" name="entityName" value="" placeholder="请输入实体名称" />
                                        <span class="help-block">实体类名称，默认与类名相同</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="packageName" class="control-label col-xs-12 col-sm-2">包名</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="packageName" name="packageName" value="" placeholder="请输入包名" />
                                        <span class="help-block">生成的代码包名，如 com.example.module</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="moduleName" class="control-label col-xs-12 col-sm-2">模块名</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="moduleName" name="moduleName" value="" placeholder="请输入模块名" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="author" class="control-label col-xs-12 col-sm-2">作者</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="author" name="author" value="" placeholder="请输入作者" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="genPath" class="control-label col-xs-12 col-sm-2">生成路径</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <input type="text" class="form-control" id="genPath" name="genPath" value="" placeholder="代码生成路径" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="control-label col-xs-12 col-sm-2">状态</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <div class="checkbox">
                                            <label>
                                                <input type="checkbox" name="enabled" id="enabled" value="1" checked /> 启用
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="remark" class="control-label col-xs-12 col-sm-2">备注</label>
                                    <div class="col-xs-12 col-sm-8">
                                        <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="请输入备注"></textarea>
                                    </div>
                                </div>

                                <div class="form-group hidden layer-footer">
                                    <label class="control-label col-xs-12 col-sm-2"></label>
                                    <div class="col-xs-12 col-sm-8">
                                        <button type="submit" class="btn btn-success btn-embossed">确定</button>
                                        <button type="reset" class="btn btn-default btn-embossed">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/assets/js/require.js" data-main="/assets/js/require-backend.js"></script>
    <script>
        function getQueryString(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }

        $(function() {
            var id = getQueryString('id');

            if (id) {
                // 编辑模式
                $.ajax({
                    url: '/meta/table/' + id,
                    type: 'GET',
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200 && res.data) {
                            var data = res.data;
                            $('#id').val(data.id);
                            $('#tableName').val(data.tableName);
                            $('#tableDesc').val(data.tableDesc);
                            $('#tableType').val(data.tableType || 1);
                            $('#className').val(data.className);
                            $('#classDesc').val(data.classDesc);
                            $('#entityName').val(data.entityName);
                            $('#packageName').val(data.packageName);
                            $('#moduleName').val(data.moduleName);
                            $('#author').val(data.author);
                            $('#genPath').val(data.genPath);
                            $('#remark').val(data.remark);

                            if (data.enabled === true || data.enabled === 1) {
                                $('#enabled').prop('checked', true);
                            } else {
                                $('#enabled').prop('checked', false);
                            }
                        }
                    }
                });
                $('#edit-form').attr('action', '/meta/table');
                $('#edit-form').attr('method', 'PUT');
            } else {
                // 添加模式
                $('#edit-form').attr('action', '/meta/table');
                $('#edit-form').attr('method', 'POST');
            }

            $('#edit-form').on('submit', function(e) {
                e.preventDefault();
                var url = $(this).attr('action');
                var method = $(this).attr('method');

                var formData = {
                    tableName: $('#tableName').val(),
                    tableDesc: $('#tableDesc').val(),
                    tableType: parseInt($('#tableType').val()),
                    className: $('#className').val(),
                    classDesc: $('#classDesc').val(),
                    entityName: $('#entityName').val(),
                    packageName: $('#packageName').val(),
                    moduleName: $('#moduleName').val(),
                    author: $('#author').val(),
                    genPath: $('#genPath').val(),
                    enabled: $('#enabled').is(':checked'),
                    remark: $('#remark').val()
                };

                if (id) {
                    formData.id = id;
                }

                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    dataType: 'json',
                    success: function(res) {
                        if (res.code === 200) {
                            Layer.msg('操作成功', {icon: 1});
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                            parent.$("#table").bootstrapTable('refresh');
                        } else {
                            Layer.msg(res.msg || '操作失败', {icon: 2});
                        }
                    },
                    error: function() {
                        Layer.msg('网络错误', {icon: 2});
                    }
                });
            });
        });
    </script>
</body>
</html>
